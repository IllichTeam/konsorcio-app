<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Variante 2 — Exploratoria · Empty state consorcios</title>
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      href="https://fonts.bunny.net/css?family=geist:400,500,600,700|geist-mono:400,500"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Geist", ui-sans-serif, system-ui, sans-serif;
        --font-mono: "Geist Mono", ui-monospace, monospace;
        --color-background: oklch(0.962 0.004 255);
        --color-foreground: oklch(0.21 0.02 250);
        --color-card: oklch(0.995 0.002 255);
        --color-primary: oklch(0.5 0.134 242.749);
        --color-primary-foreground: oklch(0.985 0.006 247.9);
        --color-muted: oklch(0.5 0.015 250);
        --color-muted-soft: oklch(0.62 0.012 255);
        --color-border: oklch(0.895 0.006 255);
        --color-ink-soft: oklch(0.38 0.02 250);
        --color-sidebar: oklch(0.945 0.005 255);
        --color-tile-blue: oklch(0.93 0.04 242.749);
        --color-tile-blue-fg: oklch(0.42 0.12 242.749);
        --radius-lg: 0.625rem;
      }
    </style>
    <style>
      :root {
        font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
      }
      .shadow-hair {
        box-shadow: 0 0 0 1px oklch(0.895 0.006 255);
      }
      .grid-noise {
        --grid-line: oklch(from oklch(0.5 0.134 242.749) l c h / 0.15);
        background-image:
          linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
        background-size: 24px 24px;
        mask-image: linear-gradient(
          to bottom,
          black 0%,
          black 55%,
          transparent 100%
        );
      }
      :focus-visible {
        outline: 2px solid oklch(0.5 0.134 242.749);
        outline-offset: 2px;
      }
      .ease-v {
        transition-property: background-color, color, border-color, box-shadow,
          transform;
        transition-duration: 200ms;
        transition-timing-function: cubic-bezier(0.23, 1, 0.32, 1);
      }
      .ghost-slot {
        background-image: radial-gradient(
          circle at 1px 1px,
          oklch(0.82 0.01 255) 1px,
          transparent 0
        );
        background-size: 12px 12px;
      }
      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .enter {
        opacity: 0;
        animation: rise-in 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .enter {
          opacity: 1;
          animation: none;
          transform: none;
        }
      }
    </style>
  </head>
  <body class="min-h-dvh bg-background text-foreground antialiased">
    <a
      class="sr-only focus:not-sr-only focus:absolute focus:left-3 focus:top-3 focus:z-50 focus:rounded-md focus:bg-foreground focus:px-3 focus:py-2 focus:text-sm focus:text-card"
      href="#contenido"
      >Saltar al contenido</a
    >

    <div class="flex min-h-dvh">
      <aside
        class="sticky top-0 hidden h-dvh w-[240px] shrink-0 flex-col border-r border-border bg-sidebar md:flex"
        aria-label="Navegación principal"
      >
        <div class="flex h-14 items-center gap-2.5 px-4">
          <span
            class="flex size-6 items-center justify-center rounded-[5px] bg-primary text-[11px] font-semibold text-primary-foreground"
            aria-hidden="true"
            >K</span
          >
          <div class="min-w-0 leading-tight">
            <p class="truncate text-[13px] font-semibold tracking-tight">
              Konsorcio
            </p>
            <p class="truncate text-[11px] text-muted">Panel de administración</p>
          </div>
        </div>
        <nav class="px-3 pt-2">
          <a
            href="#"
            class="flex items-center gap-2.5 rounded-md bg-foreground/[0.06] px-2.5 py-1.5 text-[13px] font-medium"
            aria-current="page"
          >
            <svg
              class="size-4"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path d="M3 21h18" />
              <path d="M6 21V8l6-4 6 4v13" />
              <path d="M10 21v-5h4v5" />
            </svg>
            Consorcios
          </a>
        </nav>
      </aside>

      <main class="relative min-w-0 flex-1 overflow-x-clip">
        <div
          class="pointer-events-none absolute inset-x-0 top-0 h-[420px] grid-noise"
          aria-hidden="true"
        ></div>

        <div
          id="contenido"
          class="relative mx-auto w-full max-w-[1120px] px-4 pb-24 pt-10 sm:px-6 sm:pt-12"
        >
          <section class="relative pb-10" aria-labelledby="page-title">
            <div
              class="relative flex flex-col gap-8 sm:flex-row sm:items-end sm:justify-between"
            >
              <div class="min-w-0 enter">
                <h1
                  id="page-title"
                  class="text-balance text-[2rem] font-semibold leading-[1.1] tracking-[-0.04em] sm:text-[2.375rem]"
                >
                  Selección de consorcios
                </h1>
                <p class="mt-3 text-[16px] leading-snug text-ink-soft">
                  Bienvenido, Mariana López
                </p>
              </div>

              <fieldset
                class="enter shadow-hair flex shrink-0 gap-px overflow-hidden rounded-lg border border-border bg-card"
                aria-label="Métricas globales"
                style="animation-delay: 0.06s"
              >
                <div class="min-w-[8rem] px-5 py-4">
                  <p
                    class="font-mono text-[10.5px] uppercase tracking-[0.08em] text-muted"
                  >
                    Consorcios
                  </p>
                  <p
                    class="mt-1.5 text-[1.75rem] font-semibold tracking-tight tabular-nums"
                  >
                    0
                  </p>
                  <p class="mt-0.5 text-[12px] text-muted">activos</p>
                </div>
                <div class="w-px bg-border" aria-hidden="true"></div>
                <div class="min-w-[8rem] px-5 py-4">
                  <p
                    class="font-mono text-[10.5px] uppercase tracking-[0.08em] text-muted"
                  >
                    Unidades
                  </p>
                  <p
                    class="mt-1.5 text-[1.75rem] font-semibold tracking-tight tabular-nums"
                  >
                    0
                  </p>
                  <p class="mt-0.5 text-[12px] text-muted">administradas</p>
                </div>
              </fieldset>
            </div>
          </section>

          <!-- Grid-shaped empty: first slot IS the CTA; faint placeholders hint density -->
          <section
            class="enter pt-2"
            aria-label="Lista de consorcios"
            style="animation-delay: 0.12s"
          >
            <p class="mb-4 text-[13px] text-muted">
              Empezá creando el primer consorcio. Después vas a verlos acá como
              tarjetas.
            </p>

            <ul class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-3">
              <li>
                <button
                  type="button"
                  class="ease-v ghost-slot group flex h-full min-h-[14.5rem] w-full flex-col items-center justify-center rounded-lg border border-dashed border-border-strong bg-card/60 px-5 py-8 text-center hover:border-primary/45 hover:bg-card active:scale-[0.995]"
                  style="border-color: oklch(0.82 0.01 255)"
                >
                  <span
                    class="ease-v mb-3 flex size-11 items-center justify-center rounded-lg bg-tile-blue text-tile-blue-fg group-hover:scale-105"
                    aria-hidden="true"
                  >
                    <svg
                      class="size-5"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      viewBox="0 0 24 24"
                    >
                      <path d="M5 12h14" />
                      <path d="M12 5v14" />
                    </svg>
                  </span>
                  <span
                    class="text-[15px] font-semibold tracking-tight text-foreground"
                  >
                    Agregar nuevo consorcio
                  </span>
                  <span
                    class="mt-1.5 max-w-[14rem] text-pretty text-[13px] leading-snug text-muted"
                  >
                    Nombre, ubicación y unidades. El resto se arma después.
                  </span>
                </button>
              </li>

              <!-- Placeholder silhouettes: show where cards will live -->
              <li class="hidden sm:block" aria-hidden="true">
                <div
                  class="flex h-full min-h-[14.5rem] flex-col rounded-lg border border-border/70 bg-card/40 p-5 opacity-40"
                >
                  <div class="flex items-start gap-3">
                    <div class="size-12 rounded-lg bg-muted-soft/40"></div>
                    <div class="min-w-0 flex-1 space-y-2 pt-1">
                      <div class="h-3.5 w-3/4 rounded bg-muted-soft/35"></div>
                      <div class="h-3 w-1/2 rounded bg-muted-soft/25"></div>
                    </div>
                  </div>
                  <div class="mt-8 grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                      <div class="h-2.5 w-12 rounded bg-muted-soft/30"></div>
                      <div class="h-5 w-10 rounded bg-muted-soft/25"></div>
                    </div>
                    <div class="space-y-1.5">
                      <div class="h-2.5 w-14 rounded bg-muted-soft/30"></div>
                      <div class="h-5 w-8 rounded bg-muted-soft/25"></div>
                    </div>
                  </div>
                  <div
                    class="mt-auto h-8 w-full rounded-md border border-border/60"
                  ></div>
                </div>
              </li>
              <li class="hidden xl:block" aria-hidden="true">
                <div
                  class="flex h-full min-h-[14.5rem] flex-col rounded-lg border border-border/70 bg-card/40 p-5 opacity-25"
                >
                  <div class="flex items-start gap-3">
                    <div class="size-12 rounded-lg bg-muted-soft/40"></div>
                    <div class="min-w-0 flex-1 space-y-2 pt-1">
                      <div class="h-3.5 w-2/3 rounded bg-muted-soft/35"></div>
                      <div class="h-3 w-2/5 rounded bg-muted-soft/25"></div>
                    </div>
                  </div>
                  <div class="mt-8 grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                      <div class="h-2.5 w-12 rounded bg-muted-soft/30"></div>
                      <div class="h-5 w-10 rounded bg-muted-soft/25"></div>
                    </div>
                    <div class="space-y-1.5">
                      <div class="h-2.5 w-14 rounded bg-muted-soft/30"></div>
                      <div class="h-5 w-8 rounded bg-muted-soft/25"></div>
                    </div>
                  </div>
                  <div
                    class="mt-auto h-8 w-full rounded-md border border-border/60"
                  ></div>
                </div>
              </li>
            </ul>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
